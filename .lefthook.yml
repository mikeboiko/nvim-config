pre-commit:
  parallel: false
  skip:
    - rebase
  commands:
    stylua-format:
      run: |
        staged_lua_files="$(git diff --name-only --cached --diff-filter=ACMR -- '*.lua')"
        if [ -n "$staged_lua_files" ]; then
          stylua $staged_lua_files
        fi
      stage_fixed: true
    stylua-check:
      run: stylua --check init.lua lua after tests

    lua-syntax-check:
      run: |
        tmpfile="$(mktemp)"
        trap 'rm -f "$tmpfile"' EXIT
        printf '%s\n' init.lua > "$tmpfile"
        find lua after tests -name '*.lua' -print >> "$tmpfile"
        while IFS= read -r f; do
          lua -e "assert(loadfile('$f'))"
        done < "$tmpfile"

    plenary-tests:
      run: |
        export PLENARY_PATH="${PLENARY_PATH:-$HOME/.local/share/nvim/lazy/plenary.nvim}"
        if [ ! -d "$PLENARY_PATH" ]; then
          echo "plenary.nvim not found at $PLENARY_PATH" >&2
          exit 1
        fi
        nvim --headless -u tests/minimal_init.lua \
          -c "PlenaryBustedDirectory tests/nvim-config { minimal_init = 'tests/minimal_init.lua' }" \
          -c "qa"

    startup-smoke:
      run: nvim --headless -u init.lua -c "qa"
